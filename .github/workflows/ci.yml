name: ci-tests

on:
  pull_request: {}
  release: {}
  push:
    branches: [ master ]

jobs:
  tests:
    strategy:
      matrix:
        go-version: [ 1.26.x ]
        #os: [ ubuntu-latest, macos-latest, windows-latest ]
        os: [ ubuntu-latest ]

    name: unit tests - ${{ matrix.go-version }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - run: go version

      - run: go mod verify

      - uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Moscow"
          timezoneMacos: "Europe/Moscow"
          timezoneWindows: "Europe/Moscow"

      - name: Compile tests
        run: go test -c ./...
      - name: Unit tests
        run: go test -race -v -coverprofile=coverage.out -coverpkg github.com/alexpts/go-slog-extend/... -covermode=atomic -timeout 2m ./...
      #- run: go tool cover -func=coverage.out -o=coverage.out

#      - name: Upload coverage to Codecov
#        uses: codecov/codecov-action@v6
#        env:
#          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}